<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Haya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Dancing+Script:wght@500;700&display=swap');

:root{
  --maroon-deep:#1a0509;
  --maroon:#3a0d18;
  --maroon-mid:#5c1626;
  --wine:#7a1f33;
  --rose:#c97b8a;
  --rose-light:#e8b4bc;
  --gold:#d9b66a;
  --cream:#f3e9e4;
  --star:#fff6e8;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  background:radial-gradient(ellipse at 50% 20%, var(--maroon-mid) 0%, var(--maroon) 45%, var(--maroon-deep) 100%);
  overflow:hidden;
  font-family:'Cormorant Garamond', serif;
  color:var(--cream);
  position:fixed;
}

#sky{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:0;
  pointer-events:none;
}

#petals{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:1;
  pointer-events:none;
  overflow:hidden;
}

.petal{
  position:absolute;
  top:-40px;
  font-size:18px;
  opacity:0.75;
  animation-name:fall;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
  filter:drop-shadow(0 0 4px rgba(0,0,0,0.4));
}

@keyframes fall{
  0%{ transform:translateY(-5vh) translateX(0) rotate(0deg); }
  100%{ transform:translateY(105vh) translateX(var(--drift,30px)) rotate(360deg); }
}

.stage{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:5;
  opacity:0;
  visibility:hidden;
  transition:opacity 0.9s ease;
  padding:24px;
  text-align:center;
}

.stage.active{
  opacity:1;
  visibility:visible;
}

/* ---------- STAGE 1: NAME ---------- */
.name-letters{
  display:flex;
  gap:clamp(6px, 2vw, 18px);
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(2.6rem, 13vw, 6.5rem);
  letter-spacing:0.04em;
  color:var(--rose-light);
  text-shadow:0 0 24px rgba(217,182,106,0.45), 0 4px 18px rgba(0,0,0,0.5);
}

.name-letters span{
  display:inline-block;
  opacity:0;
  transform:translateY(-160px) rotate(-8deg);
  animation-name:dropIn;
  animation-duration:0.85s;
  animation-fill-mode:forwards;
  animation-timing-function:cubic-bezier(.31,1.4,.55,1);
}

@keyframes dropIn{
  0%{ opacity:0; transform:translateY(-160px) rotate(-8deg); }
  60%{ opacity:1; transform:translateY(8px) rotate(3deg); }
  100%{ opacity:1; transform:translateY(0) rotate(0deg); }
}

/* ---------- STAGE 2: COUNTDOWN ---------- */
.count-num{
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(6rem, 30vw, 13rem);
  color:var(--gold);
  text-shadow:0 0 50px rgba(217,182,106,0.6);
}

.count-num.pulse{
  animation:countPulse 0.85s ease;
}

@keyframes countPulse{
  0%{ transform:scale(0.3); opacity:0; }
  40%{ transform:scale(1.15); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}

/* ---------- STAGE 3: GIFT ---------- */
.gift-text{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-family:'Dancing Script', cursive;
}

.gift-line1{
  font-size:clamp(2rem, 8vw, 3.4rem);
  color:var(--cream);
  opacity:0;
  animation:fadeUp 1s ease forwards;
}

.gift-line2{
  font-size:clamp(3rem, 12vw, 5.5rem);
  color:var(--rose-light);
  font-weight:700;
  opacity:0;
  text-shadow:0 0 30px rgba(217,182,106,0.5);
  animation:fadeUp 1s ease forwards 0.5s;
}

.heart-dot{
  color:var(--gold);
  margin-left:6px;
}

@keyframes fadeUp{
  0%{ opacity:0; transform:translateY(24px) scale(0.92); }
  100%{ opacity:1; transform:translateY(0) scale(1); }
}

/* ---------- STAGE 4: ENVELOPE ---------- */
.envelope-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
}

.envelope{
  position:relative;
  width:min(78vw, 320px);
  height:min(56vw, 220px);
  cursor:pointer;
  perspective:1000px;
}

.env-back, .env-front{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:6px;
  background:linear-gradient(155deg, #e9d8c5, #d9c2a8);
  box-shadow:0 18px 50px rgba(0,0,0,0.55);
}

.env-back{ z-index:1; }

.env-front{
  z-index:3;
  clip-path:polygon(0 35%, 50% 75%, 100% 35%, 100% 100%, 0 100%);
  background:linear-gradient(160deg, #f1e2d0, #ddc7ac);
}

.env-flap{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  z-index:4;
  clip-path:polygon(0 0, 100% 0, 50% 58%);
  background:linear-gradient(200deg, #d9c2a8, #c7a988);
  transform-origin:top center;
  transition:transform 1s cubic-bezier(.6,0,.4,1);
  box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

.envelope.open .env-flap{
  transform:rotateX(180deg);
}

.env-letter{
  position:absolute;
  left:8%;
  bottom:8%;
  width:84%;
  background:var(--cream);
  border-radius:6px;
  padding:18px 10px 14px;
  z-index:2;
  text-align:center;
  color:var(--maroon);
  font-style:italic;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  transform:translateY(0);
  transition:transform 1.1s cubic-bezier(.2,.8,.3,1) 0.15s;
}

.envelope.open .env-letter{
  transform:translateY(-78%);
  z-index:5;
}

.hand{
  font-size:1.6rem;
  display:block;
  margin-bottom:4px;
  animation:wave 1.6s ease-in-out infinite;
}

@keyframes wave{
  0%,100%{ transform:rotate(0deg); }
  25%{ transform:rotate(14deg); }
  75%{ transform:rotate(-10deg); }
}

.tap-hint{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:1.15rem;
  color:var(--rose-light);
  opacity:0.85;
  animation:hintFade 1.8s ease-in-out infinite;
}

@keyframes hintFade{
  0%,100%{ opacity:0.4; }
  50%{ opacity:0.95; }
}

/* ---------- STAGE 5: PHOTO STORY ---------- */
#stage-story{
  justify-content:center;
  gap:0;
}

.word-pop{
  position:absolute;
  top:8%;
  left:50%;
  transform:translateX(-50%);
  font-family:'Dancing Script', cursive;
  font-weight:700;
  font-size:clamp(2rem, 9vw, 3.6rem);
  color:var(--gold);
  text-shadow:0 0 26px rgba(217,182,106,0.55);
  opacity:0;
  z-index:6;
  pointer-events:none;
  white-space:nowrap;
}

.word-pop.show{
  animation:wordPopIn 1.6s ease forwards;
}

@keyframes wordPopIn{
  0%{ opacity:0; transform:translateX(-50%) translateY(14px) scale(0.85); }
  18%{ opacity:1; transform:translateX(-50%) translateY(0) scale(1.06); }
  30%{ transform:translateX(-50%) translateY(0) scale(1); }
  85%{ opacity:1; }
  100%{ opacity:0; transform:translateX(-50%) translateY(-10px) scale(0.96); }
}

.story-card{
  width:min(78vw, 320px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  margin-top:38px;
}

.story-img-wrap{
  width:100%;
  aspect-ratio:3/4;
  border-radius:14px;
  overflow:hidden;
  border:3px solid var(--gold);
  box-shadow:0 20px 60px rgba(0,0,0,0.6), 0 0 0 8px rgba(217,182,106,0.08);
  position:relative;
}

#storyImg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  opacity:0;
  transform:scale(1.06);
  transition:opacity 0.6s ease, transform 0.6s ease;
}

#storyImg.show{
  opacity:1;
  transform:scale(1);
}

.story-caption{
  font-style:italic;
  font-size:1.05rem;
  color:var(--rose-light);
  min-height:1.4em;
}

.story-progress{
  display:flex;
  gap:7px;
  margin-top:18px;
}

.story-progress span{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(243,233,228,0.25);
  transition:background 0.4s ease, transform 0.4s ease;
}

.story-progress span.active{
  background:var(--gold);
  transform:scale(1.25);
}

.next-btn{
  margin-top:22px;
  background:linear-gradient(135deg, var(--wine), var(--maroon-mid));
  color:var(--cream);
  border:1px solid var(--gold);
  border-radius:30px;
  padding:11px 30px;
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:1.05rem;
  letter-spacing:0.03em;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}

.next-btn:active{
  transform:scale(0.94);
}

/* ---------- STAGE 6: HEART FINALE ---------- */
#stage-heart{
  justify-content:flex-start;
  padding-top:6vh;
  gap:0;
}

.heart-title{
  font-family:'Dancing Script', cursive;
  font-weight:700;
  font-size:clamp(1.6rem, 6vw, 2.4rem);
  color:var(--rose-light);
  margin-bottom:18px;
  text-shadow:0 0 20px rgba(217,182,106,0.4);
}

.heart-wrap{
  position:relative;
  width:min(86vw, 360px);
  height:min(86vw, 340px);
}

.heart-photo{
  position:absolute;
  width:23%;
  aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  border:2px solid var(--gold);
  box-shadow:0 8px 22px rgba(0,0,0,0.55);
  opacity:0;
  transform:scale(0.3);
  animation:photoPop 0.6s cubic-bezier(.2,.9,.3,1.2) forwards;
}

.heart-photo img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

@keyframes photoPop{
  0%{ opacity:0; transform:scale(0.2); }
  70%{ opacity:1; transform:scale(1.12); }
  100%{ opacity:1; transform:scale(1); }
}

.heart-footer{
  margin-top:22px;
  font-style:italic;
  font-size:1.05rem;
  color:var(--cream);
  max-width:320px;
  line-height:1.5;
}

.replay-btn{
  margin-top:20px;
  background:transparent;
  color:var(--rose-light);
  border:1px solid var(--rose);
  border-radius:30px;
  padding:9px 22px;
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:0.95rem;
  cursor:pointer;
}

@media (max-height:640px){
  .heart-title{ font-size:1.3rem; margin-bottom:10px; }
  .heart-footer{ font-size:0.9rem; margin-top:14px; }
}

</style>
</head>
<body>

<canvas id="sky"></canvas>
<div id="petals"></div>

<!-- STAGE 1: NAME DROP -->
<section id="stage-name" class="stage active">
  <div class="name-letters" id="nameLetters"></div>
</section>

<!-- STAGE 2: COUNTDOWN -->
<section id="stage-count" class="stage">
  <div class="count-num" id="countNum">3</div>
</section>

<!-- STAGE 3: GIFT FOR YOU -->
<section id="stage-gift" class="stage">
  <div class="gift-text">
    <span class="gift-line1">Gift for you</span>
    <span class="gift-line2">baby<span class="heart-dot">♡</span></span>
  </div>
</section>

<!-- STAGE 4: ENVELOPE -->
<section id="stage-envelope" class="stage">
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="env-flap" id="envFlap"></div>
      <div class="env-letter" id="envLetter">
        <div class="hand" id="handIcon">✋</div>
        <p>open me, my love</p>
      </div>
      <div class="env-front"></div>
    </div>
    <p class="tap-hint" id="tapHint">tap the envelope</p>
  </div>
</section>

<!-- STAGE 5: PHOTO STORY -->
<section id="stage-story" class="stage">
  <div class="word-pop" id="wordPop"></div>
  <div class="story-card" id="storyCard">
    <div class="story-img-wrap">
      <img id="storyImg" src="" alt="Haya">
    </div>
    <p class="story-caption" id="storyCaption"></p>
  </div>
  <div class="story-progress" id="storyProgress"></div>
  <button class="next-btn" id="nextBtn">next ›</button>
</section>

<!-- STAGE 6: HEART FINALE -->
<section id="stage-heart" class="stage">
  <h2 class="heart-title">every piece of you, in one heart</h2>
  <div class="heart-wrap" id="heartWrap"></div>
  <p class="heart-footer">I love you, Haya. Today, tomorrow, and every day after. <span class="heart-dot">♡</span></p>
  <button class="replay-btn" id="replayBtn">watch again ↻</button>
</section>

<script>
/* ============ STARRY SKY ============ */
const skyCanvas = document.getElementById('sky');
const ctx = skyCanvas.getContext('2d');
let stars = [];

function resizeSky(){
  skyCanvas.width = window.innerWidth;
  skyCanvas.height = window.innerHeight;
  const count = Math.floor((window.innerWidth * window.innerHeight) / 4500);
  stars = Array.from({length:count}, () => ({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*1.4 + 0.3,
    baseAlpha: Math.random()*0.5 + 0.3,
    speed: Math.random()*0.02 + 0.005,
    phase: Math.random()*Math.PI*2
  }));
}
window.addEventListener('resize', resizeSky);
resizeSky();

function drawSky(t){
  ctx.clearRect(0,0,skyCanvas.width, skyCanvas.height);
  for(const s of stars){
    const alpha = s.baseAlpha + Math.sin(t*s.speed + s.phase) * 0.3;
    ctx.beginPath();
    ctx.fillStyle = `rgba(255,246,232,${Math.max(0.1, Math.min(1,alpha))})`;
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(drawSky);
}
requestAnimationFrame(drawSky);

/* ============ FALLING ROSE PETALS ============ */
const petalLayer = document.getElementById('petals');
const petalChars = ['❀','✿','❁','♡'];
function spawnPetal(){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalChars[Math.floor(Math.random()*petalChars.length)];
  p.style.left = Math.random()*100 + 'vw';
  p.style.fontSize = (12 + Math.random()*14) + 'px';
  p.style.setProperty('--drift', (Math.random()*80 - 40) + 'px');
  const dur = 9 + Math.random()*8;
  p.style.animationDuration = dur + 's';
  p.style.color = Math.random() > 0.5 ? '#e8b4bc' : '#d9b66a';
  petalLayer.appendChild(p);
  setTimeout(() => p.remove(), dur*1000 + 200);
}
setInterval(spawnPetal, 700);
for(let i=0;i<8;i++) setTimeout(spawnPetal, i*300);

/* ============ STAGE MANAGEMENT ============ */
const stages = ['stage-name','stage-count','stage-gift','stage-envelope','stage-story','stage-heart'];
function goToStage(id){
  stages.forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============ STAGE 1: NAME DROP ============ */
const NAME = "HAYA";
function runNameStage(){
  const wrap = document.getElementById('nameLetters');
  wrap.innerHTML = '';
  [...NAME].forEach((ch, i) => {
    const span = document.createElement('span');
    span.textContent = ch;
    span.style.animationDelay = (i * 0.22) + 's';
    wrap.appendChild(span);
  });
  const totalTime = NAME.length * 220 + 1100;
  setTimeout(() => {
    goToStage('stage-count');
    runCountdown();
  }, totalTime);
}

/* ============ STAGE 2: COUNTDOWN ============ */
function runCountdown(){
  const numEl = document.getElementById('countNum');
  let n = 3;
  function tick(){
    numEl.textContent = n;
    numEl.classList.remove('pulse');
    void numEl.offsetWidth;
    numEl.classList.add('pulse');
    if(n > 1){
      n -= 1;
      setTimeout(tick, 850);
    } else {
      setTimeout(() => goToStage('stage-gift'), 950);
      setTimeout(() => goToStage('stage-envelope'), 950 + 2400);
    }
  }
  tick();
}

/* ============ STAGE 4: ENVELOPE ============ */
const envelope = document.getElementById('envelope');
const tapHint = document.getElementById('tapHint');
let envelopeOpened = false;
envelope.addEventListener('click', () => {
  if(envelopeOpened) return;
  envelopeOpened = true;
  envelope.classList.add('open');
  tapHint.style.opacity = '0';
  setTimeout(() => {
    goToStage('stage-story');
    runStoryStage();
  }, 1500);
});

];

let storyIndex = 0;
const storyImg = document.getElementById('storyImg');
const storyCaption = document.getElementById('storyCaption');
const wordPop = document.getElementById('wordPop');
const storyProgress = document.getElementById('storyProgress');
const nextBtn = document.getElementById('nextBtn');

function buildProgressDots(){
  storyProgress.innerHTML = '';
  photos.forEach(() => {
    const dot = document.createElement('span');
    storyProgress.appendChild(dot);
  });
}

function updateProgressDots(){
  [...storyProgress.children].forEach((dot, i) => {
    dot.classList.toggle('active', i === storyIndex);
  });
}

function showStoryPhoto(i){
  const photo = photos[i];
  storyImg.classList.remove('show');
  setTimeout(() => {
    storyImg.src = photo.src;
    storyCaption.textContent = photo.caption;
    void storyImg.offsetWidth;
    storyImg.classList.add('show');
  }, 220);

  wordPop.classList.remove('show');
  void wordPop.offsetWidth;
  wordPop.textContent = photo.word;
  setTimeout(() => wordPop.classList.add('show'), 260);

  updateProgressDots();
}

function runStoryStage(){
  storyIndex = 0;
  buildProgressDots();
  showStoryPhoto(storyIndex);
  nextBtn.textContent = 'next ›';
}

nextBtn.addEventListener('click', () => {
  if(storyIndex < photos.length - 1){
    storyIndex += 1;
    showStoryPhoto(storyIndex);
    if(storyIndex === photos.length - 1){
      nextBtn.textContent = 'see them all together ♡';
    }
  } else {
    goToStage('stage-heart');
    runHeartStage();
  }
});

/* ============ STAGE 6: HEART FINALE ============ */
/* Heart shape positions (percent of container), tuned for a clean heart silhouette */
const heartPositions = [
  { top: 8,  left: 30 },
  { top: 8,  left: 56 },
  { top: 28, left: 13 },
  { top: 28, left: 73 },
  { top: 50, left: 38 },
  { top: 50, left: 53 },
  { top: 70, left: 39 },
];

function runHeartStage(){
  const wrap = document.getElementById('heartWrap');
  wrap.innerHTML = '';
  const positions = heartPositions.slice(0, photos.length);
  // fill remaining slots by reusing photos if fewer than 7 positions used
  photos.forEach((photo, i) => {
    const pos = positions[i] || heartPositions[i % heartPositions.length];
    const el = document.createElement('div');
    el.className = 'heart-photo';
    el.style.top = pos.top + '%';
    el.style.left = pos.left + '%';
    el.style.animationDelay = (i * 0.22) + 's';
    const img = document.createElement('img');
    img.src = photo.src;
    el.appendChild(img);
    wrap.appendChild(el);
  });
}

document.getElementById('replayBtn').addEventListener('click', () => {
  goToStage('stage-name');
  runNameStage();
});

/* ============ KICKOFF ============ */
runNameStage();
